<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVOLAZA | Créer un compte</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grain"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <img src="../images/avolaza-emblem-light.png" alt="" class="logo-seal-img">
                AVOLAZA
            </a>
            <button class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-menu-wrapper">
                <ul class="nav-menu">
                    <li><a href="../index.html" class="nav-link">Accueil</a></li>
                    <li><a href="services.html" class="nav-link">Nos Services</a></li>
                    <li><a href="produits.html" class="nav-link">Nos Produits</a></li>
                    <li><a href="apropos.html" class="nav-link">À Propos</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>

                <div class="nav-actions" data-login-href="login.html" data-account-href="compte.html">
                    <a href="login.html" class="btn-signin">Se connecter</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="nav-overlay"></div>

    <main class="auth-page">
        <div class="auth-shell animate-in" style="--d:0s">
            <p class="eyebrow">Espace client</p>
            <h1 class="auth-shell-title">Créer un compte</h1>
            <p class="auth-shell-intro">Rejoignez l'espace AVOLAZA en quelques instants.</p>

            <div class="auth-card">
                <div id="registerMessage"></div>

                <form id="registerForm" novalidate>
                    <div class="form-field">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                    </div>
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="vous@exemple.com" required>
                    </div>
                    <div class="form-field">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" placeholder="6 caractères minimum" required minlength="6">
                    </div>
                    <div class="form-field">
                        <label for="passwordConfirm">Confirmer le mot de passe</label>
                        <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="••••••••" required minlength="6">
                    </div>
                    <button type="submit" class="btn-submit">Créer mon compte</button>
                </form>
            </div>

            <p class="auth-switch">Déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
    </main>

    <script>
        (function () {
            var form = document.getElementById('registerForm');
            var messageBox = document.getElementById('registerMessage');

            function showMessage(text, type) {
                messageBox.innerHTML = '<div class="form-message ' + type + '">' + text + '</div>';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var nom = document.getElementById('nom').value;
                var email = document.getElementById('email').value;
                var password = document.getElementById('password').value;
                var passwordConfirm = document.getElementById('passwordConfirm').value;

                if (password !== passwordConfirm) {
                    showMessage('Les mots de passe ne correspondent pas.', 'error');
                    return;
                }

                window.AvolazaAuth.registerUser(nom, email, password).then(function () {
                    showMessage('Compte créé avec succès. Redirection...', 'success');
                    setTimeout(function () {
                        window.location.href = 'compte.html';
                    }, 600);
                }).catch(function (err) {
                    showMessage(err.message, 'error');
                });
            });
        })();
    </script>

    <script src="../js/nav.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
