<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVOLAZA | Connexion</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grain"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <img src="../images/avolaza-emblem-light.png" alt="" class="logo-seal-img">
                AVOLAZA
            </a>
            <button class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-menu-wrapper">
                <ul class="nav-menu">
                    <li><a href="../index.html" class="nav-link">Accueil</a></li>
                    <li><a href="services.html" class="nav-link">Nos Services</a></li>
                    <li><a href="produits.html" class="nav-link">Nos Produits</a></li>
                    <li><a href="apropos.html" class="nav-link">À Propos</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>

                <div class="nav-actions" data-login-href="login.html" data-account-href="compte.html">
                    <a href="login.html" class="btn-signin">Se connecter</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="nav-overlay"></div>

    <main class="auth-page">
        <div class="auth-shell animate-in" style="--d:0s">
            <p class="eyebrow">Espace client</p>
            <h1 class="auth-shell-title">Connexion</h1>
            <p class="auth-shell-intro">Connectez-vous pour accéder à votre espace AVOLAZA.</p>

            <div class="auth-card">
                <div id="loginMessage"></div>

                <form id="loginForm" novalidate>
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="vous@exemple.com" required>
                    </div>
                    <div class="form-field">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">Se connecter</button>
                    <p class="auth-switch" style="margin-top:16px;"><a href="#" id="forgotLink">Mot de passe oublié ?</a></p>
                </form>

                <form id="forgotForm" novalidate hidden>
                    <div class="form-field">
                        <label for="forgotEmail">Email</label>
                        <input type="email" id="forgotEmail" name="forgotEmail" placeholder="vous@exemple.com" required>
                    </div>
                    <button type="submit" class="btn-submit">Envoyer le lien de réinitialisation</button>
                    <p class="auth-switch" style="margin-top:16px;"><a href="#" id="forgotBack">Retour à la connexion</a></p>
                </form>
            </div>

            <p class="auth-switch">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
        </div>
    </main>

    <script>
        (function () {
            var form = document.getElementById('loginForm');
            var messageBox = document.getElementById('loginMessage');
            var forgotForm = document.getElementById('forgotForm');
            var forgotLink = document.getElementById('forgotLink');
            var forgotBack = document.getElementById('forgotBack');

            function showMessage(text, type) {
                messageBox.innerHTML = '<div class="form-message ' + type + '">' + text + '</div>';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var email = document.getElementById('email').value;
                var password = document.getElementById('password').value;

                window.AvolazaAuth.loginUser(email, password).then(function () {
                    showMessage('Connexion réussie. Redirection...', 'success');
                    setTimeout(function () {
                        window.location.href = 'compte.html';
                    }, 600);
                }).catch(function (err) {
                    showMessage(err.message, 'error');
                });
            });

            forgotLink.addEventListener('click', function (e) {
                e.preventDefault();
                messageBox.innerHTML = '';
                form.hidden = true;
                forgotForm.hidden = false;
            });

            forgotBack.addEventListener('click', function (e) {
                e.preventDefault();
                messageBox.innerHTML = '';
                forgotForm.hidden = true;
                form.hidden = false;
            });

            forgotForm.addEventListener('submit', function (e) {
                e.preventDefault();
                var email = document.getElementById('forgotEmail').value;

                window.AvolazaAuth.requestPasswordReset(email).then(function () {
                    showMessage('Un lien de réinitialisation a été envoyé à ' + email + '. Vérifiez votre boîte mail.', 'success');
                }).catch(function (err) {
                    showMessage(err.message, 'error');
                });
            });
        })();
    </script>

    <script src="../js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
