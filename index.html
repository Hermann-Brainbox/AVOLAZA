<!DOCTYPE html>
<html lang="fr">
<head>

    <title>AVOLAZA | Accueil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grain"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/avolaza-emblem-light.png" alt="" class="logo-seal-img">
                AVOLAZA
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Accueil</a></li>
                <li><a href="pages/services.html" class="nav-link">Nos Services</a></li>
                <li><a href="pages/produits.html" class="nav-link">Nos Produits</a></li>
                <li><a href="pages/apropos.html" class="nav-link">À Propos</a></li>
                <li><a href="pages/contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="#connexion" class="btn-signin">Se connecter</a>
            </div>
        </div>
    </nav>

    <main class="hero-avolaza">

        <div class="medallion" aria-hidden="true">
            <svg viewBox="0 0 480 480">
                <circle class="ring ring-outer" cx="240" cy="240" r="210" fill="none"/>
                <circle class="ring ring-inner" cx="240" cy="240" r="165" fill="none"/>
            </svg>
        </div>

        <div class="hero-center">
            <h1 class="sr-only">AVOLAZA — Qui incarne votre valeur.</h1>
            
            <img src="images/avolaza-logo-light.png" alt="AVOLAZA — Qui incarne votre valeur." class="hero-logo animate-in" style="--d:.15s">
            <p class="cta-text animate-in" style="--d:.5s">Hissez votre AVOLAZA :</p>
        </div>

        <div class="hero-sides">
            <a href="pages/services.html" class="side-card animate-in" style="--d:.65s">
                <p class="eyebrow">AVOLAZA</p>
                <h2 class="card-title">Services</h2>
                <span class="desc">Nos services qui vous valorisent</span>
                <span class="arrow">Découvrir <i>→</i></span>
            </a>

            <div class="divider animate-in" style="--d:.72s" aria-hidden="true">
                <span></span>
                <svg viewBox="0 0 20 20"><path d="M10 0 L20 10 L10 20 L0 10 Z"/></svg>
                <span></span>
            </div>

            <a href="pages/produits.html" class="side-card animate-in" style="--d:.8s">
                <p class="eyebrow">AVOLAZA</p>
                <h2 class="card-title">Produits</h2>
                <span class="desc">Nos produits qui vous couronnent</span>
                <span class="arrow">Découvrir <i>→</i></span>
            </a>
        </div>
